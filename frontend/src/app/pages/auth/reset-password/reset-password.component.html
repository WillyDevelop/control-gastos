<div class="min-h-screen flex items-center justify-center bg-canvas p-6">
  <div class="w-full max-w-md bg-surface border border-extended-gray-border dark:border-slate-700/60 rounded-card shadow-lg p-8 relative">
    
    <!-- Decorative Badge -->
    <div class="absolute -top-6 -right-6 w-14 h-14 bg-brand-primary text-white border border-brand-primary/50 rounded-xl flex items-center justify-center shadow-subtle">
      <span class="text-2xl font-bold">?</span>
    </div>

    <h1 class="text-2xl font-black text-brand-dark dark:text-slate-100 tracking-tight leading-none uppercase mb-6">Restablecer Clave</h1>

    <!-- Success Alert -->
    <div *ngIf="success" class="bg-extended-teal-positive/10 text-brand-dark dark:text-emerald-400 p-4 mb-6 border border-extended-teal-positive/20 rounded-2xl font-bold">
      <div class="flex items-center gap-2">
        <svg class="w-5 h-5 text-extended-teal-positive shrink-0" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path>
        </svg>
        <span>{{ success }}</span>
      </div>
      <p class="mt-2 text-xs font-semibold text-extended-gray-muted uppercase tracking-wider animate-pulse">Redirigiendo al login...</p>
    </div>

    <!-- Error Alert -->
    <div *ngIf="error" class="bg-extended-coral-negative/10 text-brand-dark dark:text-rose-400 p-4 mb-6 border border-extended-coral-negative/20 rounded-2xl font-bold flex items-start gap-2">
      <svg class="w-5 h-5 text-extended-coral-negative shrink-0 mt-0.5" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
      </svg>
      <span class="text-sm">{{ error }}</span>
    </div>

    <!-- Form -->
    <form *ngIf="!success && token" [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="space-y-5">
      
      <!-- New Password -->
      <div class="space-y-2">
        <label class="block font-bold text-brand-dark dark:text-slate-200 text-xs uppercase tracking-wider">Nueva Contraseña</label>
        <input type="password" formControlName="nuevaPassword" class="w-full p-4 bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl focus:outline-none focus:border-brand-primary focus:ring-2 focus:ring-brand-primary/10 transition-all text-brand-dark dark:text-slate-100 placeholder-extended-gray-muted/50 font-semibold text-sm" placeholder="••••••••">
        <div *ngIf="resetForm.get('nuevaPassword')?.touched && resetForm.get('nuevaPassword')?.invalid" class="text-xs text-extended-coral-negative font-bold">
          La contraseña debe tener al menos 6 caracteres.
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="space-y-2">
        <label class="block font-bold text-brand-dark dark:text-slate-200 text-xs uppercase tracking-wider">Confirmar Contraseña</label>
        <input type="password" formControlName="confirmarPassword" class="w-full p-4 bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl focus:outline-none focus:border-brand-primary focus:ring-2 focus:ring-brand-primary/10 transition-all text-brand-dark dark:text-slate-100 placeholder-extended-gray-muted/50 font-semibold text-sm" placeholder="••••••••">
        <div *ngIf="resetForm.hasError('passwordMismatch') && resetForm.get('confirmarPassword')?.touched" class="text-xs text-extended-coral-negative font-bold">
          Las contraseñas no coinciden.
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" [disabled]="loading || resetForm.invalid" class="w-full bg-brand-primary hover:bg-indigo-600 text-white p-4 font-black text-base hover:-translate-y-0.5 shadow-lg shadow-brand-primary/15 transition-all disabled:opacity-50 disabled:pointer-events-none rounded-xl uppercase tracking-wider mt-4">
        {{ loading ? 'Procesando...' : 'Restablecer Contraseña' }}
      </button>

    </form>

    <!-- Footer Links -->
    <div class="mt-8 pt-6 border-t border-slate-150 dark:border-slate-700/60 text-center">
      <a routerLink="/login" class="font-bold text-sm text-brand-primary hover:text-brand-dark dark:hover:text-indigo-400 transition-colors uppercase tracking-wider">Volver al login</a>
    </div>

  </div>
</div>
